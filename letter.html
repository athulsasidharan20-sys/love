<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>A Letter For You 💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A heartfelt letter page with music and gentle animations." />
    <meta name="theme-color" content="#1a0a10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./letter.css" />
  </head>
  <body>
    <!-- ===== PARTICLE CANVAS ===== -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <!-- ===== FLOATING PETALS ===== -->
    <div class="petal-container" aria-hidden="true">
      <span class="petal">🌸</span><span class="petal">🌹</span>
      <span class="petal">🌸</span><span class="petal">🌺</span>
      <span class="petal">🌸</span><span class="petal">💮</span>
      <span class="petal">🌸</span><span class="petal">🌹</span>
      <span class="petal">🌸</span><span class="petal">🌺</span>
    </div>
    <main class="page-wrapper">
      <!-- ===== GREETING HEADER ===== -->
      <header class="letter-header" id="letterHeader">
        <p class="letter-from">A letter from the heart 💌</p>
        <h1 class="letter-greeting" id="greetingTitle">Dearest One,</h1>
      </header>
      <!-- ===== LETTER CARD ===== -->
      <article class="letter-card" id="letterCard">
        <div class="letter-inner">
          <div class="letter-decoration top-deco">❧</div>
          <div class="letter-body" id="letterBody">
            <!-- Text injected by JS with typing animation -->
          </div>
          <div class="letter-signature">
            <p class="signature-line">With all my love,</p>
            <p class="signature-name">Forever Yours 💗</p>
          </div>
          <div class="letter-decoration bottom-deco">❧</div>
        </div>
      </article>
    </main>
    <script src="./letter.js"></script>
  </body>
</html>
