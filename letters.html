<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Letters 💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffe4f0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./letters.css" />
  </head>
  <body>
    <div class="floating-hearts" aria-hidden="true">
      <span>💕</span><span>💖</span><span>💗</span><span>💓</span>
      <span>💞</span><span>💕</span><span>💖</span><span>💗</span>
    </div>

    <div class="letters-container">
      <header class="letters-header fade-in-down">
        <a href="main.html" class="back-btn">← Back</a>
        <h1 class="main-title" id="pageTitle">Letters</h1>
        <p class="subtitle" id="pageSubtitle">A collection of memories</p>
      </header>

      <div class="letters-actions fade-in-up">
        <a href="write-letter.html" id="writeLetterBtn" class="open-btn">
          <span class="btn-heart">✏️</span>
          <span class="btn-text">Write Letter</span>
        </a>
      </div>

      <div id="loadingIndicator" class="loading-indicator">Loading letters...</div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <p>No letters available.</p>
      </div>

      <div class="folders-grid fade-in-up-delay" id="foldersGrid">
        <!-- Folders injected via JS -->
      </div>
    </div>
    <script type="module" src="./letters.js"></script>
  </body>
</html>
