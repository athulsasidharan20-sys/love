<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Letters Hub 💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffe4f0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="floating-hearts" aria-hidden="true">
      <span>💕</span><span>💖</span><span>💗</span><span>💓</span>
      <span>💞</span><span>💕</span><span>💖</span><span>💗</span>
    </div>

    <div class="hub-container">
      <div class="hanging-card-wrapper" aria-label="Special memories keepsake">
        <div class="suspension-wire"></div>
        <div class="keepsake-card">
          <div class="clothespin"></div>
          <div class="keepsake-card-content">
            <span class="keepsake-label">welcome</span>
            <p class="keepsake-title">our special memories</p>
            <a href="memories.html" class="keepsake-btn">Click Here</a>
          </div>
        </div>
      </div>

      <div class="hero-title">
        <p class="subtitle fade-in-down">A collection of memories</p>
        <h1 class="main-title fade-in-up">Whose letters do you want to read?</h1>
      </div>

      <div class="cards-wrapper fade-in-up-delay">
        <a href="letters.html?user=athul" class="hub-card">
          <div class="card-deco">❧</div>
          <h2>Athul</h2>
          <p>Read his letters</p>
        </a>

        <a href="letters.html?user=her" class="hub-card">
          <div class="card-deco">❧</div>
          <h2>Neha</h2>
          <p>Read her letters</p>
        </a>
      </div>
    </div>
  </body>
</html>
